<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project – Adrian Nowowiejski</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
    />
    <style>
      :root {
        --bg: #020617;
        --panel: #020617;
        --border-subtle: rgba(148, 163, 184, 0.25);
        --text-main: #e5e7eb;
        --text-muted: #9ca3af;
        --accent: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
        background: radial-gradient(
          circle at top left,
          #111827 0,
          #020617 55%,
          #020617 100%
        );
        color: var(--text-main);
      }

      .page-shell {
        padding: 2rem 1.25rem 3rem;
      }

      @media (min-width: 768px) {
        .page-shell {
          padding: 3rem 2rem 4rem;
        }
      }

      .page-inner {
        max-width: 1080px;
        margin: 0 auto;
      }

      .page-card {
        border-radius: 1.75rem;
        background: linear-gradient(
          135deg,
          rgba(15, 23, 42, 0.96),
          rgba(15, 23, 42, 0.98)
        );
        border: 1px solid rgba(148, 163, 184, 0.14);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.9),
          0 0 0 1px rgba(15, 23, 42, 0.9);
        padding: 1.75rem 1.6rem 2.35rem;
      }

      @media (min-width: 768px) {
        .page-card {
          padding: 2.5rem 2.3rem 2.8rem;
        }
      }

      .breadcrumb-nav {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      .breadcrumb-nav a {
        color: inherit;
        text-decoration: none;
      }

      .breadcrumb-nav a:hover {
        color: var(--accent);
      }

      .layout {
        display: grid;
        gap: 1.75rem;
      }

      @media (min-width: 992px) {
        .layout {
          grid-template-columns: minmax(0, 1.3fr) minmax(0, 1fr);
        }
      }

      .hero-title {
        font-size: clamp(1.9rem, 2.4vw + 1.2rem, 2.5rem);
        letter-spacing: -0.045em;
        line-height: 1.05;
        margin-bottom: 0.5rem;
      }

      .hero-subtitle {
        font-size: 0.96rem;
        color: var(--text-muted);
        margin-bottom: 0.9rem;
      }

      .hero-meta {
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--text-muted);
        margin-bottom: 1.4rem;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        margin-bottom: 1.4rem;
      }

      .chip {
        padding: 0.22rem 0.7rem;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        font-size: 0.78rem;
        color: var(--text-muted);
      }

      .hero-image-wrap {
        border-radius: 1.3rem;
        overflow: hidden;
        position: relative;
        background: #020617;
        border: 1px solid rgba(31, 41, 55, 0.9);
      }

      .hero-image {
        width: 100%;
        height: 260px;
        object-fit: cover;
      }

      @media (min-width: 768px) {
        .hero-image {
          height: 320px;
        }
      }

      .panel {
        border-radius: 1.1rem;
        border: 1px solid var(--border-subtle);
        background: rgba(15, 23, 42, 0.9);
        padding: 1.1rem 1.1rem 1.15rem;
      }

      .panel + .panel {
        margin-top: 0.85rem;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.7rem;
      }

      .panel-title {
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--text-muted);
      }

      .panel-body p {
        font-size: 0.9rem;
        color: var(--text-main);
        margin-bottom: 0.25rem;
      }

      .panel-body p span {
        color: var(--text-muted);
      }

      .link-list {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .link-list a {
        font-size: 0.9rem;
        color: var(--accent);
        text-decoration: none;
      }

      .link-list a span {
        text-decoration: underline transparent;
        text-underline-offset: 0.09em;
        transition: text-decoration-color 0.15s ease-out;
      }

      .link-list a:hover span {
        text-decoration-color: rgba(56, 189, 248, 0.8);
      }

      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 0.75rem;
      }

      .gallery-img-wrap {
        border-radius: 0.85rem;
        overflow: hidden;
        border: 1px solid rgba(31, 41, 55, 0.85);
      }

      .gallery-img {
        display: block;
        width: 100%;
        height: 150px;
        object-fit: cover;
        cursor: zoom-in;
      }

      .gallery-lightbox-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1050;
        cursor: zoom-out;
      }

      .gallery-lightbox-backdrop.is-visible {
        display: flex;
      }

      .gallery-lightbox-image {
        max-width: 92vw;
        max-height: 92vh;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.85);
        border-radius: 0.9rem;
      }

      footer {
        color: var(--text-muted);
      }

      footer .bi {
        color: var(--text-muted);
        transition: color 0.15s ease-out, transform 0.15s ease-out;
      }

      footer a:hover .bi {
        color: var(--accent);
        transform: translateY(-1px);
      }

      .fade-in {
        opacity: 0;
        transform: translateY(6px);
        animation: fadeInUp 0.4s ease-out forwards;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <div class="page-shell">
      <div class="page-inner">
        <div class="page-card fade-in">
          <nav class="breadcrumb-nav">
            <a href="index.html"><i class="bi bi-arrow-left-short"></i> Back</a>
            <span>/</span>
            <span id="breadcrumb-project">Project</span>
          </nav>

          <div class="layout">
            <section>
              <header>
                <p class="hero-meta" id="project-category">Project</p>
                <h1 class="hero-title" id="project-title">Project title</h1>
                <p class="hero-subtitle" id="project-description">
                  Short description of the project.
                </p>
              </header>
              <div class="chip-row" id="project-tech"></div>
              <div class="hero-image-wrap">
                <img
                  id="project-hero-image"
                  class="hero-image"
                  src=""
                  alt=""
                />
              </div>
            </section>
            <aside>
              <div class="panel">
                <div class="panel-header">
                  <h2 class="panel-title mb-0">Overview</h2>
                </div>
                <div class="panel-body" id="project-details"></div>
              </div>
              <div class="panel" id="links-panel" style="display: none">
                <div class="panel-header">
                  <h2 class="panel-title mb-0">Links</h2>
                </div>
                <div class="panel-body">
                  <ul class="link-list" id="project-links"></ul>
                </div>
              </div>
            </aside>
          </div>

          <div class="panel mt-4" id="gallery-panel" style="display: none">
            <div class="panel-header">
              <h2 class="panel-title mb-0">Gallery</h2>
            </div>
            <div class="panel-body">
              <div class="gallery-grid" id="project-gallery"></div>
            </div>
          </div>

          <div class="mt-4">
            <footer
              class="d-flex flex-wrap justify-content-between align-items-center pt-3 mt-2 border-top border-secondary-subtle"
            >
              <div
                class="col-md-4 d-flex justify-content-start align-items-center gap-2"
              >
                <span class="text-body-secondary small">© 2024</span>
                <span class="text-body-secondary small"
                  >Adrian Nowowiejski</span
                >
              </div>
              <ul
                class="nav col-md-4 justify-content-end list-unstyled d-flex"
              >
                <li class="ms-3">
                  <a
                    class="text-body-secondary"
                    href="https://www.linkedin.com/in/adrian-nowowiejski-1b88ba305/"
                  >
                    <i class="bi bi-linkedin" style="font-size: 20px"></i>
                  </a>
                </li>
                <li class="ms-3">
                  <a class="text-body-secondary" href="https://github.com/Gradi02">
                    <i class="bi bi-github" style="font-size: 20px"></i>
                  </a>
                </li>
                <li class="ms-3">
                  <a
                    class="text-body-secondary"
                    href="mailto:anowowiejski123@gmail.com"
                  >
                    <i class="bi bi-envelope" style="font-size: 20px"></i>
                  </a>
                </li>
              </ul>
            </footer>
          </div>
        </div>
      </div>
    </div>

    <div
      id="gallery-lightbox"
      class="gallery-lightbox-backdrop"
      aria-hidden="true"
      role="dialog"
      aria-label="Full size project image"
    >
      <img class="gallery-lightbox-image" src="" alt="" />
    </div>

    <script>
      function getProjectIdFromQuery() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
      }

      function renderProject(project) {
        const titleEl = document.getElementById('project-title');
        const descEl = document.getElementById('project-description');
        const categoryEl = document.getElementById('project-category');
        const breadcrumbEl = document.getElementById('breadcrumb-project');
        const heroImgEl = document.getElementById('project-hero-image');
        const techEl = document.getElementById('project-tech');
        const detailsEl = document.getElementById('project-details');
        const linksPanel = document.getElementById('links-panel');
        const linksList = document.getElementById('project-links');
        const galleryPanel = document.getElementById('gallery-panel');
        const galleryGrid = document.getElementById('project-gallery');

        document.title = project.title + ' – Adrian Nowowiejski';
        titleEl.textContent = project.title;
        descEl.textContent =
          project.description ||
          'This project entry does not yet have a longer description.';
        categoryEl.textContent = project.meta || 'Project';
        breadcrumbEl.textContent = project.title;

        heroImgEl.src = project.heroImage || project.cardImage || '';
        heroImgEl.alt = project.title;

        techEl.innerHTML = '';
        if (Array.isArray(project.tech)) {
          project.tech.forEach((t) => {
            const chip = document.createElement('span');
            chip.className = 'chip';
            chip.textContent = t;
            techEl.appendChild(chip);
          });
        }

        detailsEl.innerHTML = '';
        if (Array.isArray(project.details) && project.details.length) {
          project.details.forEach((d) => {
            const p = document.createElement('p');
            p.textContent = '\u2022 ' + d;
            detailsEl.appendChild(p);
          });
        } else {
          const p = document.createElement('p');
          p.textContent = 'Details coming soon.';
          detailsEl.appendChild(p);
        }

        linksList.innerHTML = '';
        if (Array.isArray(project.links) && project.links.length) {
          linksPanel.style.display = '';
          project.links.forEach((l) => {
            if (!l || !l.url) return;
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = l.url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            const span = document.createElement('span');
            span.textContent = l.label || l.url;
            a.appendChild(span);
            li.appendChild(a);
            linksList.appendChild(li);
          });
        } else {
          linksPanel.style.display = 'none';
        }

        galleryGrid.innerHTML = '';
        if (Array.isArray(project.gallery) && project.gallery.length) {
          galleryPanel.style.display = '';
          project.gallery.forEach((src, idx) => {
            if (!src) return;
            const wrap = document.createElement('div');
            wrap.className = 'gallery-img-wrap';
            const img = document.createElement('img');
            img.className = 'gallery-img';
            img.src = src;
            img.alt = project.title + ' screenshot ' + (idx + 1);
            wrap.appendChild(img);
            galleryGrid.appendChild(wrap);
          });
        } else {
          galleryPanel.style.display = 'none';
        }

        const lightbox = document.getElementById('gallery-lightbox');
        const lightboxImg = lightbox && lightbox.querySelector('img');

        function openLightbox(src, alt) {
          if (!lightbox || !lightboxImg || !src) return;
          lightboxImg.src = src;
          lightboxImg.alt = alt || '';
          lightbox.classList.add('is-visible');
          lightbox.setAttribute('aria-hidden', 'false');
        }

        function closeLightbox() {
          if (!lightbox || !lightboxImg) return;
          lightbox.classList.remove('is-visible');
          lightbox.setAttribute('aria-hidden', 'true');
          lightboxImg.src = '';
        }

        if (lightbox) {
          lightbox.onclick = function () {
            closeLightbox();
          };
        }

        document.addEventListener('keydown', function (event) {
          if (event.key === 'Escape') {
            closeLightbox();
          }
        });

        const galleryImages = galleryGrid.querySelectorAll('.gallery-img');
        galleryImages.forEach(function (img) {
          img.addEventListener('click', function () {
            openLightbox(img.src, img.alt);
          });
        });
      }

      function renderNotFound() {
        const container = document.querySelector('.page-card');
        container.innerHTML = `
          <div class="text-center">
            <p class="text-body-secondary mb-2" style="letter-spacing: 0.18em; text-transform: uppercase; font-size: 0.8rem;">
              Project not found
            </p>
            <h1 class="hero-title mb-3">This project does not exist</h1>
            <p class="hero-subtitle mb-4">
              The link you followed might be outdated or the project id is missing. You can go back to the main portfolio page and pick another project.
            </p>
            <a href="index.html" class="btn btn-outline-light btn-sm rounded-pill px-3">
              Back to portfolio
            </a>
          </div>
        `;
      }

      (function () {
        const id = getProjectIdFromQuery();
        if (!id) {
          renderNotFound();
          return;
        }

        fetch('projects.json')
          .then((res) => res.json())
          .then((data) => {
            const projects = (data && data.projects) || [];
            const project = projects.find((p) => p.id === id);
            if (!project) {
              renderNotFound();
              return;
            }
            renderProject(project);
          })
          .catch(() => {
            renderNotFound();
          });
      })();
    </script>
  </body>
</html>
